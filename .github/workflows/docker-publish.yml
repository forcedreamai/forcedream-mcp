name: Build and publish Docker image

# Builds and pushes forcedreamai/forcedream-mcp on every push to main (tagged "latest")
# and on every real GitHub release (tagged with the release version). Requires two real
# secrets to be set in this repo's Settings -> Secrets and variables -> Actions:
#   DOCKERHUB_USERNAME  -- your real Docker Hub username
#   DOCKERHUB_TOKEN     -- a real Docker Hub access token (Account Settings -> Security ->
#                          New Access Token on hub.docker.com), NOT your Docker Hub password.
# Neither secret is ever written into this file -- GitHub Actions injects them at runtime
# only, the same "read from environment, never bake in" discipline as everywhere else.

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          TAGS="forcedreamai/forcedream-mcp:latest"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAGS="$TAGS,forcedreamai/forcedream-mcp:${{ github.event.release.tag_name }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
