name: Build and publish Docker image

# Builds and pushes forcedreamai/forcedream-mcp on every push to main (tagged "latest")
# and on every real GitHub release (tagged with the release version). Requires two real
# secrets to be set in this repo's Settings -> Secrets and variables -> Actions:
#   DOCKERHUB_USERNAME  -- your real Docker Hub username
#   DOCKERHUB_TOKEN     -- a real Docker Hub access token (Account Settings -> Security ->
#                          New Access Token on hub.docker.com), NOT your Docker Hub password.
# Neither secret is ever written into this file -- GitHub Actions injects them at runtime
# only, the same "read from environment, never bake in" discipline as everywhere else.

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          # Real fix: pushes were failing with "insufficient scopes" regardless of the
          # token's own permissions -- the actual root cause was a namespace mismatch, not
          # a token problem. forcedreamai is the GitHub org name; the real Docker Hub
          # username is forcedream (no "ai"), confirmed directly. A token on that account
          # has no authority to push into a different, separate forcedreamai namespace.
          TAGS="forcedream/forcedream-mcp:latest"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAGS="$TAGS,forcedream/forcedream-mcp:${{ github.event.release.tag_name }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64
          # Real fix: docker/build-push-action generates a build provenance attestation by
          # default, which pushes an additional attestation manifest alongside the image --
          # a known, documented cause of this exact "insufficient scopes" error on personal
          # (non-organization) Docker Hub accounts, even with a correctly-scoped token for
          # the image push itself. Confirmed live: the token has Read/Write/Delete scope and
          # was genuinely used (timestamps match), so the token's own permissions were never
          # the actual problem.
          provenance: false
